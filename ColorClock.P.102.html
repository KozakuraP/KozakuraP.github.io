<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColorClock.Plain.101</title>
</head>
<body>

    <p id="credit">
        (C) 2026 KozakuraP
    </p>

    <p id="version">
        Ver:(P)1.0.1(260702)
    </p>

    <H1 id="clock">
        2000年1月1日(土)<br>
        0:00:00<br>
        これは標準テキストです。<br>
        エラーですので、再起動などをお試し下さい。
    </H1>

    <div class="all">
    <div class="tile" id="ta"></div>
    <div class="tile" id="tb"></div>
    <div class="tile" id="tc"></div>
    <div class="tile" id="td"></div>
    <div class="tile" id="te"></div>
    <div class="tile" id="tf"></div>
    <div class="tile" id="tg"></div>
    <div class="tile" id="th"></div>
    <div class="tile" id="ti"></div>
    <div class="tile" id="tj"></div>
    <div class="tile" id="tk"></div>
    <div class="tile" id="tl"></div>
    <div class="tile" id="tm"></div>
    <div class="tile" id="tn"></div>
    <div class="tile" id="to"></div>
    <div class="tile" id="tp"></div>
    <div class="tile" id="tq"></div>
    <div class="tile" id="tr"></div>
    <div class="tile" id="ts"></div>
    <div class="tile" id="tt"></div>
    </div>

    <style>
        #credit{
            text-align: center;
            position: fixed;
            transform: translate(-50%,-50%);
            bottom: -1%;
            left: 50%;
            color: #fdeff2;/*薄桜(和色大辞典)*/
        }

        #version{
            text-align: center;
            position: fixed;
            transform: translate(0%,-50%);
            bottom: -1%;
            right: 10px;
            color: #fdeff2;/*薄桜(和色大辞典)*/
        }

        #clock{
            text-align: center;
            position: fixed;
            color: #180614;/*烏羽色(和色大辞典)*/
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }

        body{
            margin: 0;
            padding: 0;
        }

        .all{
            display: grid;
            grid-template-columns: repeat(5,1fr);
            grid-template-rows: repeat(4,1fr);
            width: 100vw;
            height: 100vh;
        }

        .tile{
            box-sizing: border-box;        
        }
    </style>

    <script>
        const clock=document.getElementById("clock");
        const youbi=["日", "月", "火", "水", "木", "金", "土"];

        function time(){
            let now=new Date();/*今の時間を取得*/
            console.log(now);/*デバッグ用コンソールログ*/

            now_youbi=youbi[now.getDay()]/*今の曜日を取得。youbiのarrから取る*/

            clock.innerHTML/*<br>をやれるのはinnerHTMLのみ*/ =
            /*"``"を入れることでf""をやることができる*/
            `${now.getFullYear()}年
            ${now.getMonth()+1}月${now.getDate()}日(${now_youbi})<br>
            ${String(now.getHours()).padStart(2,0)}:
            ${String(now.getMinutes()).padStart(2,0)}:
            ${String(now.getSeconds()).padStart(2,0)}`;
            /*now(=時間)から各値を取る。*/
        }

        time()

        setInterval(()=>{
            time()
        },250)

        /*ここからタイル*/

        const tiles=document.querySelectorAll(".tile")
        
        /*tileのarr*/
        tile_arr=[ta,tb,tc,td,te,tf,tg,th,ti,tj,tk,tl,tm,tn,to,tp,tq,tr,ts,tt]

        function color_select(){
            tile_colorR=
            Math.floor(Math.random()*256).toString(16).padStart(2,"0")
            /*ランダムして、16進変換した後にゼロ埋め*/

            tile_colorG=
            Math.floor(Math.random()*256).toString(16).padStart(2,"0")

            tile_colorB=
            Math.floor(Math.random()*256).toString(16).padStart(2,"0")

            tile_color="#"+tile_colorR+tile_colorG+tile_colorB;
        }

        let tile_color="";

        let num=0;
        while(num<20){
            
            color_select()
            tile_arr[num].style.backgroundColor=tile_color;
            num+=1;
        }

        setInterval(()=>{
            random_tile=tile_arr[Math.floor(Math.random()*tile_arr.length)];
            color_select()
            random_tile.style.backgroundColor=tile_color
        },500);
    </script>
</body>
</html>
